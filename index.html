<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Developer Portfolio & Project Hub Dashboard</title>
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div class="dashboard-container">
    
    <!-- HEADER -->
    <header>
      <div class="logo-section">
        <h1>
          <i class="fa-solid fa-terminal"></i> DEV_HUB v1.0
        </h1>
      </div>
      <div class="header-controls">
        <div id="system-clock">
          <i class="fa-regular fa-clock"></i> <span id="clock-display">00:00:00 PM</span>
        </div>
        <button class="theme-switch-btn" id="theme-toggle" title="Toggle Theme">
          <i class="fa-solid fa-moon"></i>
        </button>
      </div>
    </header>

    <!-- MAIN GRID LAYOUT -->
    <main class="dashboard-grid">
      
      <!-- COLUMN 1: GITHUB ANALYTICS -->
      <section class="glass-panel github-panel">
        <div class="panel-header">
          <h2><i class="fa-brands fa-github"></i> GitHub Analytics</h2>
          <span class="panel-action-indicator" id="github-status">Idle</span>
        </div>
        
        <!-- Search bar -->
        <div class="search-bar">
          <input type="text" id="github-username-input" placeholder="Enter GitHub username..." value="octocat">
          <button class="primary-btn" id="fetch-github-btn">
            <i class="fa-solid fa-magnifying-glass"></i> Load
          </button>
        </div>

        <!-- Dynamic Profile Details -->
        <div id="github-profile" class="github-profile-card">
          <!-- Populated by JS -->
          <div class="inbox-empty-state">
            <i class="fa-solid fa-spinner fa-spin"></i>
            <p>Loading developer profile...</p>
          </div>
        </div>

        <h4 class="repos-section-title">Top Public Repositories</h4>
        <!-- Repo Cards List -->
        <div id="github-repos" class="repo-list">
          <!-- Populated by JS -->
        </div>
      </section>

      <!-- COLUMN 2: SKILLS RADAR CANVAS -->
      <section class="glass-panel skills-panel">
        <div class="panel-header">
          <h2><i class="fa-solid fa-chart-pie"></i> Skills Matrix</h2>
          <span class="panel-action-indicator" style="color: var(--accent-color);">Interactive</span>
        </div>
        
        <!-- Radar Chart -->
        <div class="chart-wrapper">
          <canvas id="skills-chart"></canvas>
        </div>

        <!-- Sliders -->
        <div class="skills-adjuster" id="skills-sliders">
          <!-- Sliders will be generated dynamically by JS for flexibility -->
        </div>
      </section>

      <!-- COLUMN 3: PROJECT PROGRESS TRACKER -->
      <section class="glass-panel projects-panel">
        <div class="panel-header">
          <h2><i class="fa-solid fa-bars-progress"></i> Project Hub</h2>
          <span class="panel-action-indicator" style="color: var(--accent-color);" id="project-count">0 Active</span>
        </div>

        <!-- Add project form -->
        <div class="project-controls">
          <input type="text" id="new-project-title" placeholder="Project name (e.g. E-Commerce)...">
          <select id="new-project-status">
            <option value="planning">Planning</option>
            <option value="in_progress" selected>In Progress</option>
            <option value="completed">Completed</option>
          </select>
          <button class="primary-btn" id="add-project-btn">
            <i class="fa-solid fa-plus"></i> Add Project
          </button>
        </div>

        <!-- Project Checklist List -->
        <div class="project-list-container" id="projects-list">
          <!-- Populated by JS -->
        </div>
      </section>

      <!-- FULL ROW: CONTACT SIMULATOR & NOTIFICATION FEED -->
      <section class="glass-panel inbox-panel">
        <div class="panel-header">
          <h2><i class="fa-solid fa-envelope-open-text"></i> Portfolio Contact Simulator</h2>
          <span class="panel-action-indicator" style="color: var(--accent-color);" id="inbox-count">0 Messages</span>
        </div>

        <div class="inbox-split">
          <!-- Form Simulator -->
          <div class="simulator-form-side">
            <div class="form-group">
              <label for="sim-sender">Sender Name</label>
              <input type="text" id="sim-sender" placeholder="e.g. Sarah Connor" required>
            </div>
            <div class="form-group">
              <label for="sim-subject">Subject</label>
              <input type="text" id="sim-subject" placeholder="e.g. Freelance Opportunity" required>
            </div>
            <div class="form-group">
              <label for="sim-message">Message Body</label>
              <textarea id="sim-message" rows="4" placeholder="Type a message to simulate receiving it on your website..." required></textarea>
            </div>
            <button class="primary-btn" id="simulate-msg-btn" style="width: 100%;">
              <i class="fa-solid fa-paper-plane"></i> Send Test Message
            </button>
          </div>

          <!-- Inbox Feed -->
          <div class="messages-feed-side">
            <div class="messages-list-wrapper" id="messages-list">
              <!-- Populated by JS -->
            </div>
          </div>
        </div>
      </section>

    </main>

  </div>

  <!-- JavaScript logic -->
  <script src="app.js"></script>
</body>
</html>
